services:
  tuesday-db:
    image: postgres:16-alpine
    container_name: tuesday-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tuesday-pgdata:/var/lib/postgresql/data
    networks:
      - tuesday-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tuesday-backend:
    build: ./backend
    container_name: tuesday-backend
    depends_on:
      tuesday-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
    volumes:
      - ./backend:/app
    networks:
      - tuesday-net
    command: >
      sh -c "python -m app.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  tuesday-frontend:
    build: ./frontend
    container_name: tuesday-frontend
    networks:
      - tuesday-net
    restart: unless-stopped

  tuesday-nginx:
    build: ./nginx
    container_name: tuesday-nginx
    depends_on:
      - tuesday-backend
      - tuesday-frontend
    ports:
      - "8001:80"
    networks:
      - tuesday-net
    restart: unless-stopped

volumes:
  tuesday-pgdata:

networks:
  tuesday-net:
    name: tuesday-net
